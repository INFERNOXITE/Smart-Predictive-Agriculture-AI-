kind = "web"
previewPath = "/"
title = "Rover Irrigation & Fertiliser AI"
version = "1.0.0"
id = "artifacts/rover-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23083

[services.development]
run = "pnpm --filter @workspace/rover-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rover-dashboard", "run", "build" ]
publicDir = "artifacts/rover-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23083"
BASE_PATH = "/"
